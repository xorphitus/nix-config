# https://github.com/jj-vcs/jj/blob/main/docs/config.md

"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "xorphitus"
email = "xorphitus@gmail.com"

[ui]
editor = "emacsclient -c -a nano"
diff-editor = "meld"
diff-formatter = "delta"

[aliases]
aicommit = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
LLAMA_SWAP_URL="http://localhost:9292"
LLAMA_MODEL="Gemma-4-E2B"
CLAUDE_MODEL=haiku

DIFF=$(jj diff --git)
PROMPT="Generate ONLY a jj commit message in English. The message should follow Conventional Commits format 'type(scope): description'. Types: feat, fix, docs, style, refactor, test, chore. Based strictly on the diff. Output ONLY the message, nothing else. Here are the diff\n: ${DIFF}"

MSG=""
if curl --silent --fail --max-time 2 --output /dev/null "${LLAMA_SWAP_URL}/v1/models"; then
REQ=$(jq -n --arg model "$LLAMA_MODEL" --arg prompt "$PROMPT" '{
  model: $model,
  messages: [{role: "user", content: $prompt}]
}')
MSG=$(curl --silent --fail --max-time 120 \
  -H "Content-Type: application/json" \
  -d "$REQ" \
  "${LLAMA_SWAP_URL}/v1/chat/completions" \
  | jq -r '.choices[0].message.content')
else
MSG=$(claude --no-session-persistence --model "$CLAUDE_MODEL" --print "$PROMPT")
fi

jj commit -m "$MSG"
""", ""]

bpush = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
branch="$1"
jj bookmark set "$branch" -r @-
jj git push -b "$branch" --allow-new
""", ""]

[merge-tools.meld]
program = "meld"
edit-args = ["--newtab", "$left", "$right"]

[merge-tools.delta]
diff-args = ["--side-by-side", "$left", "$right", "--width=$width"]
diff-expected-exit-codes = [0, 1]
